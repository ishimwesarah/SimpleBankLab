name: Java CI

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main


jobs:

  build:

    runs-on: ubuntu-latest


    steps:

      - name: Checkout repository
        uses: actions/checkout@v4


      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'


      - name: Compile Java files
        run: |
          mkdir build
          javac -d build src/*.java


      - name: Run tests
        run: |
          echo "Tests will run here"